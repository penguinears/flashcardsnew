<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy Flashcards</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #87CEFA;
    font-family: system-ui, sans-serif;
    display: flex;
    justify-content: center;
  }

  .back-btn {
    position: absolute;
    top: 14px;
    left: 14px;
    z-index: 20;
    padding: 8px 16px;
    border-radius: 999px;
    background: rgb(177,151,252);
    color: #fff;
    text-decoration: none;
    font-size: 0.95rem;
  }

  canvas {
    display: block;
    background: #87CEFA;
  }

  .flashcard-popup {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 340px;
    transform: translate(-50%, -50%);
    background: #f4edff;
    border: 2px solid rgba(177,151,252,0.6);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    z-index: 30;
    display: none;
  }

  .flash-input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #aaa;
    font-size: 1rem;
    margin-top: 10px;
  }

  .flash-submit {
    margin-top: 12px;
    padding: 10px;
    width: 100%;
    border-radius: 10px;
    border: none;
    background: rgb(177,151,252);
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
  }

  .death-screen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    z-index: 40;
    display: none;
  }

  .death-screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .score {
    position: absolute;
    top: 10px;
    right: 20px;
    font-size: 28px;
    font-weight: bold;
    color: white;
    text-shadow: 2px 2px 4px black;
    z-index: 25;
  }
</style>
</head>

<body>

<a class="back-btn" href="gamepage.html">◂ Back</a>

<div class="score" id="score">0</div>

<canvas id="game"></canvas>

<div class="flashcard-popup" id="flashcard">
  <h2 id="flashcard-question">Type the answer:</h2>
  <input class="flash-input" id="flash-input" placeholder="Your answer...">
  <button class="flash-submit" id="flash-submit">Submit</button>
</div>

<div class="death-screen" id="death">
  <img src="images/you died.png">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* DEVICE ID */
let deviceId = localStorage.getItem("deviceId");
if (!deviceId) {
  deviceId = "dev_" + Math.random().toString(36).substring(2);
  localStorage.setItem("deviceId", deviceId);
}

const firebaseConfig = {
  apiKey: "AIzaSyAa2F5JvKW39sa-6dZct_5AA_IkK9_qWuQ",
  authDomain: "flashcards-c5a5d.firebaseapp.com",
  projectId: "flashcards-c5a5d",
  storageBucket: "flashcards-c5a5d.firebasestorage.app",
  messagingSenderId: "543230755849",
  appId: "1:543230755849:web:32faecba0d923cd51024d8",
  measurementId: "G-PV1J86WTH9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app,
 "https://flashcards-c5a5d-default-rtdb.europe-west1.firebasedatabase.app/"
);

/* Load active collections + cards */
let activeCollections = {};
let cards = [];

onValue(ref(db, "activeCollections/" + deviceId), snap => {
  activeCollections = snap.val() || {};
  loadCards();
});

onValue(ref(db, "cards/" + deviceId), snap => {
  const all = snap.val() || {};
  cards = Object.values(all);
  loadCards();
});

let gameFlashcards = [];

function loadCards() {
  const activeIds = Object.keys(activeCollections).filter(id => activeCollections[id]);
  gameFlashcards = cards.filter(c => activeIds.includes(c.collectionId));
}

/* XP system */
let meta = { xp: 0 };
const metaRef = ref(db, "meta");

onValue(metaRef, snap => {
  meta = snap.val() || meta;
});

function addXP(amount) {
  meta.xp += amount;
  set(metaRef, meta);
}

/* GAME SETUP */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 420;
canvas.height = 700;

let birdImg = new Image();
birdImg.src = "images/birb.png";

let pipeImg = new Image();
pipeImg.src = "images/bigpipe.png";

let bird = {
  x: 120,
  y: canvas.height / 2,
  w: 48,
  h: 48,
  vel: 0
};

/* SUPER EASY PHYSICS */
let gravity = 0.18;
let jump = -10;
let pipeGap = 300;
let pipeSpeed = 1.4;

let pipes = [];
let awaitingAnswer = false;
let currentCard = null;
let gameStarted = false;
let score = 0;

function spawnPipe() {
  let topHeight = Math.random() * (canvas.height - pipeGap - 300) + 100;

  pipes.push({
    x: canvas.width,
    top: topHeight,
    bottom: topHeight + pipeGap,
    passed: false
  });
}

setInterval(spawnPipe, 3000);

/* Flashcard popup */
const flashcardBox = document.getElementById("flashcard");
const flashInput = document.getElementById("flash-input");
const flashSubmit = document.getElementById("flash-submit");
const flashQuestion = document.getElementById("flashcard-question");

/* Death screen */
const deathScreen = document.getElementById("death");

function showFlashcard(card) {
  awaitingAnswer = true;
  currentCard = card;

  flashQuestion.textContent = card.front;
  flashInput.value = "";
  flashcardBox.style.display = "block";
}

flashSubmit.onclick = () => {
  let typed = flashInput.value.trim().toLowerCase();
  let correct = currentCard.back.trim().toLowerCase();

  if (typed === correct) {
    awaitingAnswer = false;
    flashcardBox.style.display = "none";
    addXP(10);
  } else {
    die();
  }
};

/* DIE */
function die() {
  deathScreen.style.display = "block";
  setTimeout(() => {
    location.reload();
  }, 2000);
}

/* GAME LOOP */
function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (gameStarted && !awaitingAnswer) {
    bird.vel += gravity;
    bird.y += bird.vel;
  }

  ctx.drawImage(birdImg, bird.x, bird.y, bird.w, bird.h);

  pipes.forEach(pipe => {
    if (!awaitingAnswer) pipe.x -= pipeSpeed;

    /* Flip top pipe upside-down */
    ctx.save();
    ctx.translate(pipe.x + 80, pipe.top);
    ctx.scale(1, -1);
    ctx.drawImage(pipeImg, -80, 0, 80, pipeImg.height);
    ctx.restore();

    /* Bottom pipe normal */
    ctx.drawImage(pipeImg, pipe.x, pipe.bottom, 80, pipeImg.height);

    /* Collision */
    if (
      gameStarted &&
      !awaitingAnswer &&
      bird.x + bird.w > pipe.x &&
      bird.x < pipe.x + 80 &&
      (bird.y < pipe.top || bird.y + bird.h > pipe.bottom)
    ) {
      die();
    }

    /* Score */
    if (!pipe.passed && pipe.x + 80 < bird.x) {
      pipe.passed = true;
      score++;
      document.getElementById("score").textContent = score;
    }

    /* Flashcard trigger */
    if (
      gameStarted &&
      !awaitingAnswer &&
      pipe.x + 80 < bird.x &&
      pipe.x + 80 > bird.x - pipeSpeed
    ) {
      if (gameFlashcards.length > 0) {
        let card = gameFlashcards[Math.floor(Math.random() * gameFlashcards.length)];
        showFlashcard(card);
      }
    }
  });

  requestAnimationFrame(loop);
}

loop();

/* Controls */
window.addEventListener("mousedown", () => {
  if (!gameStarted) gameStarted = true;
  if (!awaitingAnswer) bird.vel = jump;
});

window.addEventListener("keydown", () => {
  if (!gameStarted) gameStarted = true;
  if (!awaitingAnswer) bird.vel = jump;
});
</script>

</body>
</html>
