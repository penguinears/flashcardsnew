<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Games</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
  body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #fff;
    color: #111;
    padding: 20px;
  }
        .header {
  padding: 60px;
  text-align: center;
  background: #1abc9c;
  color: white;
  font-size: 30px;
}

  .back-btn {
    display: inline-block;
    padding: 8px 16px;
    border-radius: 999px;
    background: rgb(177,151,252);
    color: #fff;
    text-decoration: none;
    margin-bottom: 20px;
    font-size: 0.95rem;
  }

  h1 {
    margin-bottom: 20px;
  }

  .games-row {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

.game-box {
  flex: 1;
  min-width: 180px;
  background: #ffffff;
  border-radius: 14px;
  padding: 16px;
  text-align: center;
  cursor: pointer;
  transition: 0.15s;
  border: 1px solid #e5e5e5;  
}

  .game-box:hover {
    background: #eee4ff;
    transform: translateY(-2px);
  }

  .game-box img {
    width: 80px;
    height: 80px;
    object-fit: contain;
    margin-bottom: 10px;
  }

  .game-title {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .coming {
    margin-top: 30px;
    font-size: 0.9rem;
    color: #777;
  }
</style>
</head>

<body>


    <div class="header">
      <a class="back-btn" href="index.html">◂ Back</a>
      <h1><bold>Game</bold> Page</h1>
    <p>The New super dupa fun way to revise.</p>
    </div>

<div class="games-row">

  <!-- Flappy Flashcards -->
  <div class="game-box" onclick="window.location='flappycards.html'">
    <img src="images/flappyicon.png" alt="Flappy Flashcards">
    <div class="game-title">Flappy Flashcards</div>
  </div>

  <!-- Snake -->
  <div class="game-box" onclick="window.location='snake.html'">
    <img src="images/snake.png" alt="Snake">
    <div class="game-title">Snake</div>
  </div>

</div>

<div class="coming">more coming soon...</div>

</body>
</html>
