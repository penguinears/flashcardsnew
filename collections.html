<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Collections</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
  body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #fff;
    color: #111;
    padding: 20px;
  }
          .header {
  padding: 60px;
  text-align: center;
  background: #1abc9c;
  color: white;
  font-size: 30px;
}

  .back-btn {
    display: inline-block;
    padding: 8px 16px;
    border-radius: 999px;
    background: rgb(177,151,252);
    color: #fff;
    text-decoration: none;
    margin-bottom: 20px;
    font-size: 0.95rem;
  }

  h1 {
    margin-bottom: 10px;
  }

  .subtitle {
    color: #666;
    margin-bottom: 20px;
  }

  .collections-list {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
  }

  .collection-pill {
    padding: 8px 14px;
    border-radius: 999px;
    background: #f7f3ff;
    border: 1px solid rgba(177,151,252,0.6);
    cursor: pointer;
    font-size: 0.9rem;
    color: #111;
    transition: 0.15s;
  }

  .collection-pill:hover {
    background: #eee4ff;
  }

  .collection-pill.active {
    background: rgb(177,151,252);
    color: #fff;
  }

  .new-btn {
    margin-top: 10px;
    padding: 10px 16px;
    border-radius: 999px;
    background: rgb(177,151,252);
    color: #fff;
    border: none;
    cursor: pointer;
    font-size: 1rem;
  }

  .active-name {
    margin-top: 20px;
    font-size: 1.1rem;
    font-weight: 600;
  }

  /* Flashcard grid */
  .cards-grid {
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
  }

  .card-box {
    background: #f4edff;
    border-radius: 12px;
    padding: 14px;
    border: 1px solid rgba(177,151,252,0.4);
    cursor: pointer;
    position: relative;
    transition: 0.15s;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .card-box:hover {
    background: #ece2ff;
  }

  .card-box.flipped {
    background: #e8ddff;
  }

  .card-box .dumpster {
    position: absolute;
    top: 6px;
    right: 6px;
    font-size: 1rem;
    opacity: 0.8;
  }

  .card-box.edit-mode {
    transform: scale(1.05);
    background: #e2d4ff;
  }

  .edit-btn {
    position: absolute;
    bottom: 6px;
    right: 6px;
    font-size: 1rem;
    opacity: 0.9;
  }

  /* Add new card box */
  .add-card-box {
    border: 2px dotted rgba(177,151,252,0.6);
    background: #faf7ff;
    border-radius: 12px;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 1.2rem;
    color: rgb(177,151,252);
    transition: 0.15s;
  }

  .add-card-box:hover {
    background: #f2eaff;
  }
</style>
</head>

<body>

 <div class="header">
   
<a class="back-btn" href="index.html">◂ Back</a>
   <h1>Your Collections.</h1>
    <div class="subtitle">Tap to use. (you can use more than one at once)</div>
    </div>

<div class="collections-list" id="collections-list"></div>

<button class="new-btn" id="new-collection-btn">New Collection</button>

<div class="active-name" id="active-name"></div>

<div class="cards-grid" id="cards-grid"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, set, update, onValue }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* DEVICE ID */
let deviceId = localStorage.getItem("deviceId");
if (!deviceId) {
  deviceId = "dev_" + Math.random().toString(36).substring(2);
  localStorage.setItem("deviceId", deviceId);
}

const firebaseConfig = {
  apiKey: "AIzaSyAa2F5JvKW39sa-6dZct_5AA_IkK9_qWuQ",
  authDomain: "flashcards-c5a5d.firebaseapp.com",
  projectId: "flashcards-c5a5d",
  storageBucket: "flashcards-c5a5d.firebasestorage.app",
  messagingSenderId: "543230755849",
  appId: "1:543230755849:web:32faecba0d923cd51024d8",
  measurementId: "G-PV1J86WTH9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app,
 "https://flashcards-c5a5d-default-rtdb.europe-west1.firebasedatabase.app/"
);

/* DB refs */
const collectionsRef = ref(db, "collections/" + deviceId);
const activeRef = ref(db, "activeCollections/" + deviceId);
const cardsRef = ref(db, "cards/" + deviceId);

/* MIGRATION: move old collections into device folder */
const globalCollectionsRef = ref(db, "collections");
const globalCardsRef = ref(db, "cards");

onValue(globalCollectionsRef, snap => {
  const all = snap.val() || {};

  onValue(collectionsRef, snap2 => {
    const mine = snap2.val() || {};

    if (Object.keys(mine).length === 0 && Object.keys(all).length > 0) {
      Object.entries(all).forEach(([id, col]) => {
        set(ref(db, "collections/" + deviceId + "/" + id), col);
      });
    }
  });
});

onValue(globalCardsRef, snap => {
  const all = snap.val() || {};

  onValue(cardsRef, snap2 => {
    const mine = snap2.val() || {};

    if (Object.keys(mine).length === 0 && Object.keys(all).length > 0) {
      Object.entries(all).forEach(([id, card]) => {
        set(ref(db, "cards/" + deviceId + "/" + id), card);
      });
    }
  });
});

/* Elements */
const listEl = document.getElementById("collections-list");
const newBtn = document.getElementById("new-collection-btn");
const activeNameEl = document.getElementById("active-name");
const cardsGridEl = document.getElementById("cards-grid");

let collections = {};
let active = {};
let cards = {};

function renderCollections() {
  listEl.innerHTML = "";

  Object.entries(collections).forEach(([id, col]) => {
    const pill = document.createElement("button");
    pill.className = "collection-pill";
    pill.textContent = col.name;

    const isActive = active[id];
    if (isActive) pill.classList.add("active");

    pill.onclick = () => {
      update(activeRef, { [id]: !isActive });
    };

    listEl.appendChild(pill);
  });

  renderActiveCollection();
}

function renderActiveCollection() {
  const activeIds = Object.keys(active).filter(id => active[id]);

  if (activeIds.length === 0) {
    activeNameEl.textContent = "";
    cardsGridEl.innerHTML = "";
    return;
  }

  const id = activeIds[0];
  const col = collections[id];

  activeNameEl.textContent = col.name;

  const colCards = Object.entries(cards)
    .filter(([cid, c]) => c.collectionId === id);

  cardsGridEl.innerHTML = "";

  colCards.forEach(([cid, c]) => {
    const box = document.createElement("div");
    box.className = "card-box";
    box.textContent = c.front;

    const dumpster = document.createElement("div");
    dumpster.className = "dumpster";
    dumpster.innerHTML =
      `<i class="fa-solid fa-dumpster" style="color: rgb(177,151,252);"></i>`;
    box.appendChild(dumpster);

    let flipped = false;
    let editMode = false;

    box.onclick = () => {
      if (editMode) return;
      flipped = !flipped;
      box.classList.toggle("flipped");
      box.textContent = flipped ? c.back : c.front;
      box.appendChild(dumpster);
    };

    dumpster.onclick = (e) => {
      e.stopPropagation();
      editMode = true;
      box.classList.add("edit-mode");

      const editBtn = document.createElement("div");
      editBtn.className = "edit-btn";
      editBtn.innerHTML =
        `<i class="fa-solid fa-pencil" style="color: rgb(177,151,252);"></i>`;
      box.appendChild(editBtn);

      editBtn.onclick = (ev) => {
        ev.stopPropagation();
        const newFront = prompt("New front:", c.front);
        const newBack = prompt("New back:", c.back);
        if (!newFront || !newBack) return;

        update(ref(db, "cards/" + deviceId + "/" + cid), {
          front: newFront,
          back: newBack
        });
      };
    };

    cardsGridEl.appendChild(box);
  });

  /* Add new card box */
  const addBox = document.createElement("div");
  addBox.className = "add-card-box";
  addBox.innerHTML = `<i class="fa-solid fa-plus"></i>`;
  addBox.onclick = () => {
    window.location = "add.html";
  };

  cardsGridEl.appendChild(addBox);
}

/* DB listeners */
onValue(collectionsRef, snap => {
  collections = snap.val() || {};
  renderCollections();
});

onValue(activeRef, snap => {
  active = snap.val() || {};
  renderCollections();
});

onValue(cardsRef, snap => {
  cards = snap.val() || {};
  renderActiveCollection();
});

/* New collection */
newBtn.onclick = () => {
  const name = prompt("Collection name:");
  if (!name) return;

  const newRef = push(collectionsRef);
  set(newRef, { name });
};
</script>

</body>
</html>
