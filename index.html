<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>drevisonmade.fun</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
  body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #ffffff;
    color: #111;
  }

  .banner {
    width: 100%;
    background: #fff;
    padding: 10px 0;
    border-bottom: 1px solid #e5e5e5;
    text-align: center;
  }

  .banner img {
    max-width: 100%;
    height: auto;
    object-fit: contain;
  }

  .shell {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px;
  }

  .nav-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .nav-tile {
    flex: 1;
    min-width: 140px;
    background: #f7f3ff;
    border-radius: 14px;
    padding: 14px 12px;
    text-align: center;
    border: 1px solid rgba(177,151,252,0.6);
    cursor: pointer;
    text-decoration: none;
    color: #111;
    transition: 0.15s;
  }

  .nav-tile:hover {
    background: #eee4ff;
    transform: translateY(-2px);
  }

  .nav-tile i {
    font-size: 1.6rem;
    color: rgb(177,151,252);
  }

  .nav-label {
    margin-top: 6px;
    font-size: 0.95rem;
    text-transform: uppercase;
  }

  .card {
    border-radius: 16px;
    border: 1px solid #e5e5e5;
    padding: 16px;
    background: #fff;
  }

  .streak-icon i {
    font-size: 2rem;
  }

  .btn {
    border-radius: 999px;
    padding: 8px 16px;
    border: none;
    cursor: pointer;
    font-size: 0.9rem;
  }

  .btn-purple {
    background: rgb(177,151,252);
    color: #fff;
  }

  .btn-outline {
    background: #fff;
    border: 1px solid #ccc;
  }
</style>
</head>

<body>

<div class="banner">
  <img src="images/banner.jpeg">
</div>

<div class="shell">

  <h1 style="margin-bottom:20px;">drevisonmade.fun</h1>

  <div class="nav-row">
    <a class="nav-tile" href="collections.html">
      <i class="fa-solid fa-layer-group"></i>
      <div class="nav-label">Collections</div>
    </a>

    <a class="nav-tile" href="add.html">
      <i class="fa-solid fa-plus"></i>
      <div class="nav-label">Add Cards</div>
    </a>

    <a class="nav-tile" href="freeplay.html">
      <i class="fa-solid fa-lightbulb"></i>
      <div class="nav-label">Free Practice</div>
    </a>

    <a class="nav-tile" href="gamepage.html">
      <i class="fa-solid fa-gamepad"></i>
      <div class="nav-label">Games</div>
    </a>
  </div>

  <div class="card">
    <h2 style="margin-bottom:10px;">Streak</h2>

    <div class="streak-icon" id="streak-icon">
      <i class="fa-solid fa-fire" style="color:#ccc;"></i>
    </div>

    <p>XP: <span id="xp-value">0</span></p>
    <p>Streak: <span id="streak-value">0</span> days</p>
    <p>Freezes: <span id="freeze-value">1</span></p>

    <button class="btn btn-purple" id="log-card-btn">Log one card (+10 XP)</button>
    <button class="btn btn-outline" id="freeze-btn">Freeze / Unfreeze</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAa2F5JvKW39sa-6dZct_5AA_IkK9_qWuQ",
  authDomain: "flashcards-c5a5d.firebaseapp.com",
  projectId: "flashcards-c5a5d",
  storageBucket: "flashcards-c5a5d.firebasestorage.app",
  messagingSenderId: "543230755849",
  appId: "1:543230755849:web:32faecba0d923cd51024d8",
  measurementId: "G-PV1J86WTH9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app,
 "https://flashcards-c5a5d-default-rtdb.europe-west1.firebasedatabase.app/"
);

const metaRef = ref(db, "meta");

let meta = { xp:0, frozen:false, usedFreezes:0 };

function updateUI() {
  const xp = meta.xp;
  const streak = Math.floor(xp/100);
  const freezes = 1 + Math.floor(xp/500) - meta.usedFreezes;

  document.getElementById("xp-value").textContent = xp;
  document.getElementById("streak-value").textContent = streak;
  document.getElementById("freeze-value").textContent = freezes;

  let color = "#ccc";
  if (xp > 0 && !meta.frozen) color = "#ff8c00";
  if (meta.frozen) color = "#3fa9f5";

  document.getElementById("streak-icon").innerHTML =
    `<i class="fa-solid fa-fire" style="color:${color};"></i>`;
}

onValue(metaRef, snap => {
  meta = snap.val() || meta;
  updateUI();
});

document.getElementById("log-card-btn").onclick = () => {
  meta.xp += 10;
  set(metaRef, meta);
};

document.getElementById("freeze-btn").onclick = () => {
  const xp = meta.xp;
  const total = 1 + Math.floor(xp/500);
  const available = total - meta.usedFreezes;

  if (!meta.frozen && available > 0) {
    meta.frozen = true;
    meta.usedFreezes++;
  } else {
    meta.frozen = false;
  }
  set(metaRef, meta);
};
</script>

</body>
</html>
