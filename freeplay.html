<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Freeplay Flashcards</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
  body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #f4edff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .wrap {
    width: 100%;
    max-width: 480px;
    padding: 16px;
  }

  /* TOP BAR */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .top-bar button {
    border: none;
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 0.9rem;
    cursor: pointer;
    background: rgb(177,151,252);
    color: #fff;
  }

  .summary-text {
    font-size: 0.85rem;
    color: #555;
  }

  .timer {
    font-size: 0.85rem;
    color: #333;
  }

  /* PROGRESS BAR */
  .progress-bar {
    width: 100%;
    height: 10px;
    background: #ddd;
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 12px;
    display: flex;
  }

  .prog-red { background: rgb(212, 23, 38); }
  .prog-yellow { background: rgb(255, 212, 59); }
  .prog-green { background: rgb(99, 230, 190); }

  /* CARD + SLIDE ANIMATION */
  .card-shell {
    width: 100%;
    height: 240px;
    overflow: hidden;
    position: relative;
    margin-bottom: 20px;
  }

  .card {
    width: 320px;
    height: 200px;
    perspective: 1000px;
    cursor: pointer;
    position: absolute;
    left: 50%;
    top: 20px;
    transform: translateX(-50%);
    transition: transform 0.45s ease, opacity 0.45s ease;
  }

  .slide-out-left {
    transform: translateX(-150%) rotateZ(-5deg);
    opacity: 0;
  }

  .slide-out-right {
    transform: translateX(150%) rotateZ(5deg);
    opacity: 0;
  }

  .slide-in {
    transform: translateX(-50%);
    opacity: 1;
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.5s;
    transform-style: preserve-3d;
  }

  .card.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 1rem;
  }

  .card-back {
    transform: rotateY(180deg);
    background: #e7dbff;
  }

  /* ARROWS + CONFIDENCE BUTTONS */
  .bottom-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-btn {
    font-size: 1.8rem;
    cursor: pointer;
    color: rgb(177,151,252);
    width: 50px;
    text-align: center;
  }

  .confidence-row {
    display: flex;
    gap: 8px;
    flex: 1;
    justify-content: center;
  }

  .conf-btn {
    flex: 1;
    border: none;
    border-radius: 12px;
    padding: 10px;
    cursor: pointer;
    background: #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 0.9rem;
  }

  .conf-low i { color: rgb(212, 23, 38); }
  .conf-mid i { color: rgb(255, 212, 59); }
  .conf-high i { color: rgb(99, 230, 190); }

  /* COMPLETION SCREEN */
  .completion {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #fff;
    padding: 20px;
    display: none;
    z-index: 50;
    text-align: center;
  }

  .completion h2 {
    margin-bottom: 16px;
  }

  .completion button {
    margin-top: 12px;
    padding: 10px 16px;
    border-radius: 12px;
    border: none;
    background: rgb(177,151,252);
    color: #fff;
    cursor: pointer;
    font-size: 1rem;
  }

  .conf-bar {
    width: 100%;
    height: 14px;
    background: #ddd;
    border-radius: 999px;
    overflow: hidden;
    margin-top: 12px;
    display: flex;
  }
</style>
</head>

<body>
<div class="wrap">

  <div class="top-bar">
    <button id="mode-btn">Mode: All</button>
    <div class="timer" id="timer">0:00</div>
    <div class="summary-text" id="summary">Confidence: -</div>
  </div>

  <div class="progress-bar" id="progress"></div>

  <div class="card-shell">
    <div class="card slide-in" id="card">
      <div class="card-inner">
        <div class="card-face card-front" id="card-front">Loading…</div>
        <div class="card-face card-back" id="card-back">Answer</div>
      </div>
    </div>
  </div>

  <div class="bottom-row">
    <div class="nav-btn" id="prev-btn">
      <i class="fa-solid fa-arrow-left"></i>
    </div>

    <div class="confidence-row">
      <button class="conf-btn conf-low" id="conf-low">
        <i class="fa-solid fa-thumbs-down"></i>
      </button>
      <button class="conf-btn conf-mid" id="conf-mid">
        <i class="fa-solid fa-hand"></i>
      </button>
      <button class="conf-btn conf-high" id="conf-high">
        <i class="fa-solid fa-thumbs-up"></i>
      </button>
    </div>

    <div class="nav-btn" id="next-btn">
      <i class="fa-solid fa-arrow-right"></i>
    </div>
  </div>

  <!-- COMPLETION SCREEN -->
  <div class="completion" id="completion">
    <h2>Session Complete!</h2>
    <p id="comp-stats"></p>

    <div class="conf-bar" id="conf-bar"></div>

    <button id="redo-weak">Redo Weak Cards</button>
    <button id="redo-all">Restart Full Session</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* DEVICE ID */
let deviceId = localStorage.getItem("deviceId");
if (!deviceId) {
  deviceId = "dev_" + Math.random().toString(36).substring(2);
  localStorage.setItem("deviceId", deviceId);
}

const firebaseConfig = {
  apiKey: "AIzaSyAa2F5JvKW39sa-6dZct_5AA_IkK9_qWuQ",
  authDomain: "flashcards-c5a5d.firebaseapp.com",
  projectId: "flashcards-c5a5d",
  storageBucket: "flashcards-c5a5d.firebasestorage.app",
  messagingSenderId: "543230755849",
  appId: "1:543230755849:web:32faecba0d923cd51024d8",
  measurementId: "G-PV1J86WTH9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app,
 "https://flashcards-c5a5d-default-rtdb.europe-west1.firebasedatabase.app/"
);

/* DOM */
const cardEl = document.getElementById("card");
const frontEl = document.getElementById("card-front");
const backEl = document.getElementById("card-back");
const prevBtn = document.getElementById("prev-btn");
const nextBtn = document.getElementById("next-btn");
const confLow = document.getElementById("conf-low");
const confMid = document.getElementById("conf-mid");
const confHigh = document.getElementById("conf-high");
const summaryEl = document.getElementById("summary");
const modeBtn = document.getElementById("mode-btn");
const progressBar = document.getElementById("progress");
const timerEl = document.getElementById("timer");
const completionEl = document.getElementById("completion");
const compStatsEl = document.getElementById("comp-stats");
const confBarEl = document.getElementById("conf-bar");
const redoWeakBtn = document.getElementById("redo-weak");
const redoAllBtn = document.getElementById("redo-all");

/* Data */
let activeCollections = {};
let cards = [];
let studyCards = [];
let currentIndex = 0;
let modeWeakOnly = false;

/* Confidence map: cardId -> 0/1/2 */
let confidence = {};

/* Timer */
let seconds = 0;
setInterval(() => {
  seconds++;
  let m = Math.floor(seconds / 60);
  let s = seconds % 60;
  timerEl.textContent = `${m}:${s.toString().padStart(2,"0")}`;
}, 1000);

onValue(ref(db, "activeCollections/" + deviceId), snap => {
  activeCollections = snap.val() || {};
  buildStudyCards();
});

onValue(ref(db, "cards/" + deviceId), snap => {
  const all = snap.val() || {};
  cards = Object.values(all);
  buildStudyCards();
});

function buildStudyCards() {
  const activeIds = Object.keys(activeCollections).filter(id => activeCollections[id]);
  studyCards = cards.filter(c => activeIds.includes(c.collectionId));
  currentIndex = 0;
  renderCard();
  updateSummary();
  updateProgress();
}

function getCurrentList() {
  if (!modeWeakOnly) return studyCards;
  return studyCards.filter(c => confidence[c.id] <= 1);
}

function animateSlide(direction) {
  cardEl.classList.remove("slide-in");
  cardEl.classList.remove("slide-out-left");
  cardEl.classList.remove("slide-out-right");

  cardEl.classList.add(direction === "left" ? "slide-out-left" : "slide-out-right");

  setTimeout(() => {
    renderCard();
    cardEl.classList.remove("slide-out-left");
    cardEl.classList.remove("slide-out-right");
    cardEl.classList.add("slide-in");
  }, 450);
}

function renderCard() {
  const list = getCurrentList();
  if (list.length === 0) {
    showCompletion();
    return;
  }
  if (currentIndex < 0) currentIndex = list.length - 1;
  if (currentIndex >= list.length) currentIndex = 0;

  const card = list[currentIndex];
  frontEl.textContent = card.front || "No question";
  backEl.textContent = card.back || "No answer";
  cardEl.classList.remove("flipped");
}

cardEl.addEventListener("click", () => {
  cardEl.classList.toggle("flipped");
});

prevBtn.addEventListener("click", () => {
  currentIndex--;
  animateSlide("left");
});

nextBtn.addEventListener("click", () => {
  currentIndex++;
  animateSlide("right");
});

function setConfidence(level) {
  const list = getCurrentList();
  if (list.length === 0) return;
  const card = list[currentIndex];
  confidence[card.id] = level;
  updateSummary();
  updateProgress();

  currentIndex++;
  animateSlide("right");
}

confLow.addEventListener("click", () => setConfidence(0));
confMid.addEventListener("click", () => setConfidence(1));
confHigh.addEventListener("click", () => setConfidence(2));

function updateSummary() {
  const list = studyCards;
  if (list.length === 0) {
    summaryEl.textContent = "Confidence: -";
    return;
  }
  let total = 0;
  let counted = 0;
  let weak = 0;

  list.forEach(c => {
    const val = confidence[c.id];
    if (val !== undefined) {
      total += val;
      counted++;
      if (val <= 1) weak++;
    }
  });

  if (counted === 0) {
    summaryEl.textContent = "Confidence: not rated";
  } else {
    const avg = (total / counted).toFixed(2);
    summaryEl.textContent =
      `Confidence avg: ${avg}/2 • Weak: ${weak}/${counted}`;
  }
}

function updateProgress() {
  const list = studyCards;
  let red = 0, yellow = 0, green = 0;

  list.forEach(c => {
    const val = confidence[c.id];
    if (val === 0) red++;
    else if (val === 1) yellow++;
    else if (val === 2) green++;
  });

  progressBar.innerHTML = "";

  const total = list.length || 1;

  if (red > 0) {
    const seg = document.createElement("div");
    seg.className = "prog-red";
    seg.style.width = `${(red/total)*100}%`;
    progressBar.appendChild(seg);
  }

  if (yellow > 0) {
    const seg = document.createElement("div");
    seg.className = "prog-yellow";
    seg.style.width = `${(yellow/total)*100}%`;
    progressBar.appendChild(seg);
  }

  if (green > 0) {
    const seg = document.createElement("div");
    seg.className = "prog-green";
    seg.style.width = `${(green/total)*100}%`;
    progressBar.appendChild(seg);
  }
}

modeBtn.addEventListener("click", () => {
  modeWeakOnly = !modeWeakOnly;
  modeBtn.textContent = modeWeakOnly ? "Mode: Weak" : "Mode: All";
  currentIndex = 0;
  renderCard();
});

/* COMPLETION SCREEN */
function showCompletion() {
  const list = studyCards;
  let red = 0, yellow = 0, green = 0;

  list.forEach(c => {
    const val = confidence[c.id];
    if (val === 0) red++;
    else if (val === 1) yellow++;
    else if (val === 2) green++;
  });

  compStatsEl.innerHTML =
    `Total: ${list.length}<br>
     Don’t know: ${red}<br>
     Alright: ${yellow}<br>
     Good: ${green}`;

  confBarEl.innerHTML = "";
  const total = list.length || 1;

  if (red > 0) {
    const seg = document.createElement("div");
    seg.className = "prog-red";
    seg.style.width = `${(red/total)*100}%`;
    confBarEl.appendChild(seg);
  }

  if (yellow > 0) {
    const seg = document.createElement("div");
    seg.className = "prog-yellow";
    seg.style.width = `${(yellow/total)*100}%`;
    confBarEl.appendChild(seg);
  }

  if (green > 0) {
    const seg = document.createElement("div");
    seg.className = "prog-green";
    seg.style.width = `${(green/total)*100}%`;
    confBarEl.appendChild(seg);
  }

  completionEl.style.display = "block";
}

redoWeakBtn.addEventListener("click", () => {
  modeWeakOnly = true;
  completionEl.style.display = "none";
  currentIndex = 0;
  renderCard();
});

redoAllBtn.addEventListener("click", () => {
  modeWeakOnly = false;
  completionEl.style.display = "none";
  currentIndex = 0;
  renderCard();
});
</script>
</body>
</html>
