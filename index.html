<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>drevisonmade.fun</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <!-- Firebase v10 CDN (modular) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
    import {
      getDatabase,
      ref,
      push,
      set,
      onValue,
      update
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAa2F5JvKW39sa-6dZct_5AA_IkK9_qWuQ",
      authDomain: "flashcards-c5a5d.firebaseapp.com",
      projectId: "flashcards-c5a5d",
      storageBucket: "flashcards-c5a5d.firebasestorage.app",
      messagingSenderId: "543230755849",
      appId: "1:543230755849:web:32faecba0d923cd51024d8",
      measurementId: "G-PV1J86WTH9"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getDatabase(app);

    const collectionsList = document.addEventListener("DOMContentLoaded", () => {
      const collectionsContainer = document.getElementById("collections-list");
      const activeCollectionsContainer = document.getElementById("active-collections");
      const addCardForm = document.getElementById("add-card-form");
      const addCardModal = document.getElementById("add-card-modal");
      const addCardOpenBtn = document.getElementById("add-btn");
      const addCardCloseBtn = document.getElementById("close-add-modal");
      const collectionSelect = document.getElementById("card-collection");
      const cardFrontInput = document.getElementById("card-front");
      const cardBackInput = document.getElementById("card-back");

      const collectionsRef = ref(db, "collections");
      const cardsRef = ref(db, "cards");
      const activeRef = ref(db, "activeCollections");

      // Load collections
      onValue(collectionsRef, snapshot => {
        const data = snapshot.val() || {};
        collectionsContainer.innerHTML = "";
        collectionSelect.innerHTML = "";

        Object.entries(data).forEach(([id, col]) => {
          const item = document.createElement("button");
          item.className = "collection-item";
          item.dataset.id = id;
          item.textContent = col.name || "Untitled";

          item.addEventListener("click", () => {
            const isActive = item.classList.toggle("active");
            updateActiveCollection(id, isActive);
          });

          collectionsContainer.appendChild(item);

          const opt = document.createElement("option");
          opt.value = id;
          opt.textContent = col.name || "Untitled";
          collectionSelect.appendChild(opt);
        });
      });

      // Load active collections
      onValue(activeRef, snapshot => {
        const data = snapshot.val() || {};
        activeCollectionsContainer.innerHTML = "";
        Object.entries(data).forEach(([id, active]) => {
          if (active) {
            const tag = document.createElement("span");
            tag.className = "active-tag";
            tag.textContent = id;
            activeCollectionsContainer.appendChild(tag);
          }
        });
      });

      function updateActiveCollection(id, isActive) {
        update(activeRef, { [id]: isActive });
      }

      // Add card modal
      addCardOpenBtn.addEventListener("click", () => {
        addCardModal.classList.add("show");
      });

      addCardCloseBtn.addEventListener("click", () => {
        addCardModal.classList.remove("show");
      });

      addCardForm.addEventListener("submit", e => {
        e.preventDefault();
        const front = cardFrontInput.value.trim();
        const back = cardBackInput.value.trim();
        const collectionId = collectionSelect.value;

        if (!front || !back || !collectionId) return;

        const newCardRef = push(cardsRef);
        set(newCardRef, {
          front,
          back,
          collectionId,
          createdAt: Date.now()
        }).then(() => {
          cardFrontInput.value = "";
          cardBackInput.value = "";
          addCardModal.classList.remove("show");
        });
      });
    });
  </script>

  <style>
    :root {
      --purple-main: rgb(177, 151, 252);
      --purple-dark: #5b3ea8;
      --bg: #0b0b12;
      --card-bg: #151524;
      --text-main: #ffffff;
      --text-muted: #b3b3c7;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1b1230 0, #050509 55%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .banner {
      width: 100%;
      height: 220px;
      background: #000;
      overflow: hidden;
    }

    .banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .shell {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }

    .title-row h1 {
      font-size: 1.6rem;
      letter-spacing: 0.04em;
    }

    .title-row span {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .nav-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nav-tile {
      flex: 1;
      min-width: 140px;
      background: linear-gradient(135deg, #1f1635, #151524);
      border-radius: 14px;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      border: 1px solid rgba(177, 151, 252, 0.35);
      transition: transform 0.12s ease, box-shadow 0.12s ease,
        border-color 0.12s ease;
    }

    .nav-tile:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.55);
      border-color: var(--purple-main);
    }

    .nav-tile i {
      font-size: 1.6rem;
      color: var(--purple-main);
    }

    .nav-label {
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-main);
    }

    .nav-sub {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: center;
    }

    .panel {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 16px 14px 18px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .panel-header h2 {
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .panel-header span {
      font-size: 0.8rem;
      color: var(--purple-main);
    }

    .collections-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .collection-item {
      border-radius: 999px;
      border: 1px solid rgba(177, 151, 252, 0.4);
      background: #1b1b2b;
      color: var(--text-main);
      padding: 6px 12px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.12s ease, border-color 0.12s ease,
        color 0.12s ease;
    }

    .collection-item.active {
      background: var(--purple-main);
      border-color: var(--purple-main);
      color: #050509;
    }

    .active-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 22px;
    }

    .active-tag {
      font-size: 0.75rem;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(177, 151, 252, 0.16);
      color: var(--purple-main);
    }

    .panel-footer {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* Add card modal */

    #add-card-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }

    #add-card-modal.show {
      display: flex;
    }

    .modal-inner {
      width: 100%;
      max-width: 420px;
      background: #11111c;
      border-radius: 16px;
      padding: 18px 16px 16px;
      border: 1px solid rgba(177, 151, 252, 0.5);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .modal-header h3 {
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .modal-header button {
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.9rem;
    }

    .modal-body {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .field input,
    .field select {
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: #181824;
      color: var(--text-main);
      padding: 7px 9px;
      font-size: 0.85rem;
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--purple-main);
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .primary-btn {
      border-radius: 999px;
      border: none;
      background: var(--purple-main);
      color: #050509;
      padding: 7px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: 600;
    }

    .primary-btn:hover {
      filter: brightness(1.05);
    }

    @media (max-width: 640px) {
      .banner {
        height: 180px;
      }
      .nav-tile {
        min-width: calc(50% - 8px);
      }
    }
  </style>
</head>
<body>
  <!-- Full-width banner -->
  <div class="banner">
    <img src="images/banner.jpeg" alt="drevisonmade.fun banner" />
  </div>

  <main class="shell">
    <div class="title-row">
      <h1>drevisonmade.fun</h1>
      <span>Flashcard decks, practice, and games in one place.</span>
    </div>

    <!-- Main row of actions -->
    <section class="nav-row">
      <!-- Collections -->
      <button class="nav-tile" type="button" id="collections-btn">
        <i class="fa-solid fa-layer-group" style="color: rgb(177, 151, 252);"></i>
        <div class="nav-label">Collections</div>
        <div class="nav-sub">Browse and activate one or more decks.</div>
      </button>

      <!-- Add card -->
      <button class="nav-tile" type="button" id="add-btn">
        <i class="fa-solid fa-plus" style="color: rgb(177, 151, 252);"></i>
        <div class="nav-label">Add</div>
        <div class="nav-sub">Create new cards for your decks.</div>
      </button>

      <!-- Free practice -->
      <a class="nav-tile" href="freeplay.html">
        <i class="fa-solid fa-lightbulb" style="color: rgb(177, 151, 252);"></i>
        <div class="nav-label">Free practice</div>
        <div class="nav-sub">Drill active cards with no rules.</div>
      </a>

      <!-- Games -->
      <a class="nav-tile" href="gamepage.html">
        <i class="fa-solid fa-gamepad" style="color: rgb(177, 151, 252);"></i>
        <div class="nav-label">Games</div>
        <div class="nav-sub">Play with your decks in game modes.</div>
      </a>
    </section>

    <!-- Collections panel -->
    <section class="panel" id="collections-panel">
      <div class="panel-header">
        <h2>Collections</h2>
        <span>Select one or more to activate.</span>
      </div>

      <div class="collections-strip" id="collections-list">
        <!-- Filled from Firebase: each button is a collection -->
      </div>

      <div class="panel-footer">
        <div>Active collections:</div>
        <div class="active-row" id="active-collections"></div>
      </div>
    </section>
  </main>

  <!-- Add card modal -->
  <div id="add-card-modal">
    <div class="modal-inner">
      <div class="modal-header">
        <h3>Add card</h3>
        <button id="close-add-modal">Close</button>
      </div>
      <form id="add-card-form">
        <div class="modal-body">
          <div class="field">
            <label for="card-collection">Collection</label>
            <select id="card-collection" required></select>
          </div>
          <div class="field">
            <label for="card-front">Front</label>
            <input id="card-front" type="text" autocomplete="off" required />
          </div>
          <div class="field">
            <label for="card-back">Back</label>
            <input id="card-back" type="text" autocomplete="off" required />
          </div>
        </div>
        <div class="modal-footer">
          <button class="primary-btn" type="submit">Save card</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
